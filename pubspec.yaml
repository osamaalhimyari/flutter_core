name: my_core
description: "A configurable Flutter core package: theming, localization, networking, storage, and device info via framework-agnostic controllers, with no state-management lock-in."
version: 0.1.1
homepage: https://github.com/osamaalhimyari/my_core.git

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.9.2

  # Maps (concrete RouteService / SearchService — Polylines + Places)
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^3.1.0

  # Storage (persist locale/theme; token + key/value + JSON)
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Device / app info
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0

  # Functional error handling + value equality
  dartz: ^0.10.1
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
