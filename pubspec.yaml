name: flutter_core
description: "Shared core for the im2m taxi apps (driver & rider): config, theme (ThemeData), localization, network, storage (token + key/value + JSON), device info, and framework-agnostic controllers. No state-management lock-in — wire it into Bloc, GetX or Provider via the CoreContext that Core.init returns."
version: 0.3.0
publish_to: 'none'
homepage:

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.9.2

  # Maps (concrete RouteService / SearchService — Polylines + Places)
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^2.1.0

  # Storage (persist locale/theme; token + key/value + JSON)
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Device / app info
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1

  # Functional error handling + value equality
  dartz: ^0.10.1
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
