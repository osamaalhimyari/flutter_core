name: example
description: "Example app for my_core — exercises every service (theme, locale, network, storage, device info, location, geocoding, notifications, sound, foreground, route, search) via buttons, with permissions wired."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # The package under test.
  my_core:
    path: ../

  # Platform impls of core's service contracts (these are why the impls live
  # app-side, not in the pure contracts).
  geolocator: ^14.0.2 # LocationService
  geocoding: ^4.0.0 # GeocodingService
  flutter_local_notifications: ^18.0.1 # NotificationService
  flutter_foreground_task: ^9.1.0 # ForegroundService
  permission_handler: ^12.0.1 # runtime permissions
  google_maps_flutter: ^2.17.0 # LatLng for Route/Search demos
  image_picker: ^1.2.1 # ImagePickerField widget

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
